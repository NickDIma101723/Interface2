<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Meme Museum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
 
</head>
<body class="overflow-x-hidden">
    <!-- Header -->
    <header class="py-6 px-8 bg-white border-b border-black">
        <div class="flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold hover:opacity-70 transition-opacity">MEME MUSEUM</a>
            <div class="flex gap-8 font-sans text-sm uppercase tracking-wider">
                <a href="index.html" class="hover:opacity-70 transition-opacity">Home</a>
                <a href="gallery.html" class="hover:opacity-70 transition-opacity">Gallery</a>
            </div>
        </div>
    </header>

    <!-- Filters Section -->
    <div class="py-8 px-8 fade-in bg-white">
        <div class="max-w-7xl mx-auto">
            <h1 class="text-4xl font-bold mb-6">Gallery</h1>
            <div class="flex gap-4 flex-wrap items-center">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Search memes..." 
                    class="flex-1 min-w-[250px] bg-white border border-black px-4 py-3 text-base font-sans focus:outline-none focus:border-gray-600"
                >
                <select id="year-filter" class="bg-white border border-black px-4 py-3 text-base font-sans focus:outline-none focus:border-gray-600">
                    <option value="all">All Years</option>
                </select>
                <select id="category-filter" class="bg-white border border-black px-4 py-3 text-base font-sans focus:outline-none focus:border-gray-600">
                    <option value="all">All Categories</option>
                </select>
                <button id="reset-filters" class="bg-black text-white px-6 py-3 text-sm uppercase tracking-wider font-sans hover:bg-gray-800 transition-colors">
                    Reset
                </button>
            </div>
            <p id="results-count" class="mt-6 text-sm font-sans text-gray-600 uppercase tracking-wide">Loading...</p>
        </div>
    </div>

    <!-- Gallery Grid with Lines -->
    <div class="relative p-0">
        <div id="gallery-wrapper" class="relative">
            <div id="gallery-grid" class="grid grid-cols-3 relative w-full"></div>
            <!-- Vertical lines will be added here dynamically -->
            <div id="vertical-lines"></div>
            <!-- Horizontal lines will be added here dynamically -->
            <div id="horizontal-lines"></div>
        </div>
    </div>

    <!-- No Results -->
    <div id="no-results" class="hidden text-center py-32 text-xl font-sans text-gray-600">No memes found.</div>
    <div id="loading" class="text-center py-32 text-xl font-sans">Loading gallery...</div>
    <div id="error" class="hidden text-center py-32 text-xl text-red-600">Error loading memes!</div>

    <script type="module">
        import { fetchMemes, getUniqueYears, getUniqueCategories } from './js/api.js';
        import { filterBySearch, filterByYear, filterByCategory } from './js/filters.js';

        let allMemes = [];
        let filteredMemes = [];

        // Draw grid lines
        function drawGridLines(itemCount) {
            const verticalLinesContainer = document.getElementById('vertical-lines');
            const horizontalLinesContainer = document.getElementById('horizontal-lines');
            const wrapper = document.getElementById('gallery-wrapper');
            
            // Clear existing lines
            verticalLinesContainer.innerHTML = '';
            horizontalLinesContainer.innerHTML = '';
            
            const cols = 3;
            const rows = Math.ceil(itemCount / cols);
            
            // Draw vertical lines (4 lines for 3 columns)
            for (let i = 0; i <= cols; i++) {
                const line = document.createElement('div');
                line.className = 'absolute top-0 bottom-0 w-px bg-black';
                line.style.left = `${(i / cols) * 100}%`;
                verticalLinesContainer.appendChild(line);
            }
            
            // Draw horizontal lines
            const gridElement = document.getElementById('gallery-grid');
            const itemHeight = gridElement.children[0]?.offsetHeight || 0;
            
            for (let i = 0; i <= rows; i++) {
                const line = document.createElement('div');
                line.className = 'absolute left-0 right-0 h-px bg-black';
                line.style.top = `${i * itemHeight}px`;
                horizontalLinesContainer.appendChild(line);
            }
        }

        // Render gallery
        function renderGallery(memes) {
            const grid = document.getElementById('gallery-grid');
            const loading = document.getElementById('loading');
            const noResults = document.getElementById('no-results');
            const resultsCount = document.getElementById('results-count');

            loading.classList.add('hidden');

            if (memes.length === 0) {
                grid.innerHTML = '';
                noResults.classList.remove('hidden');
                resultsCount.textContent = '0 memes found';
                return;
            }

            noResults.classList.add('hidden');

            const html = memes.map((meme, index) => {
                // Random sizes for variety
                const sizes = ['50%', '60%', '70%', '80%', '65%', '75%'];
                const size = sizes[index % sizes.length];
                
                return `
                <div class="aspect-[4/3] overflow-hidden relative p-12 flex items-center justify-center group fade-in" style="animation-delay: ${index * 0.05}s">
                    <div class="flex items-center justify-center transition-all duration-400 group-hover:blur-lg" style="width: ${size}; height: ${size};">
                        <img src="${meme.imageUrl}" alt="${meme.title}" loading="lazy" class="max-w-full max-h-full object-contain">
                    </div>
                    <div class="absolute bottom-0 left-0 p-8 opacity-0 group-hover:opacity-100 transition-opacity duration-400 pointer-events-none text-left z-10">
                        <h3 class="text-xl font-bold mb-1">${meme.title}</h3>
                        <p class="text-sm font-sans">${meme.year} • ${meme.category}</p>
                    </div>
                </div>
                `;
            }).join('');

            grid.innerHTML = html;
            resultsCount.textContent = `${memes.length} meme${memes.length !== 1 ? 's' : ''} found`;
            
            // Draw lines after images are rendered
            setTimeout(() => {
                drawGridLines(memes.length);
            }, 100);
        }

        // Populate filters
        function populateFilters() {
            const yearFilter = document.getElementById('year-filter');
            const categoryFilter = document.getElementById('category-filter');

            const years = getUniqueYears(allMemes);
            const categories = getUniqueCategories(allMemes);

            years.forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year;
                yearFilter.appendChild(option);
            });

            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                categoryFilter.appendChild(option);
            });
        }

        // Apply filters
        function applyFilters() {
            const searchQuery = document.getElementById('search-input').value;
            const selectedYear = document.getElementById('year-filter').value;
            const selectedCategory = document.getElementById('category-filter').value;

            filteredMemes = filterBySearch(allMemes, searchQuery);
            filteredMemes = filterByYear(filteredMemes, selectedYear);
            filteredMemes = filterByCategory(filteredMemes, selectedCategory);

            renderGallery(filteredMemes);
        }

        // Event listeners
        document.getElementById('search-input').addEventListener('input', applyFilters);
        document.getElementById('year-filter').addEventListener('change', applyFilters);
        document.getElementById('category-filter').addEventListener('change', applyFilters);
        document.getElementById('reset-filters').addEventListener('click', () => {
            document.getElementById('search-input').value = '';
            document.getElementById('year-filter').value = 'all';
            document.getElementById('category-filter').value = 'all';
            applyFilters();
        });

        // Redraw lines on window resize
        window.addEventListener('resize', () => {
            if (filteredMemes.length > 0) {
                drawGridLines(filteredMemes.length);
            }
        });

        // Initialize
        async function init() {
            try {
                allMemes = await fetchMemes();
                filteredMemes = allMemes;
                populateFilters();
                renderGallery(filteredMemes);
            } catch (error) {
                console.error('Error loading memes:', error);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').classList.remove('hidden');
            }
        }

        init();
    </script>
</body>
</html>
